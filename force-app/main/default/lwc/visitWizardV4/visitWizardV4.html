<template>
    <lightning-quick-action-panel header={panelHeader}>
        <template if:true={loading}>
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </template>

        <template if:true={errorMessage}>
            <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium" role="alert">
                <span>{errorMessage}</span>
            </div>
        </template>

        <div class="wizard" data-source-account-id={accountId}>
            <div class={stepbarClass}>
                <template for:each={steps} for:item="stepItem">
                    <div key={stepItem.value} class={stepItem.className}>
                        <span class="step-number">{stepItem.value}</span>
                        <span>{stepItem.label}</span>
                    </div>
                </template>
            </div>

            <template if:true={isRecordTypeStep}>
                <section>
                    <h2 class="slds-text-heading_small slds-m-bottom_x-small">Select Visit Record Type</h2>
                    <div class="record-type-grid">
                        <template for:each={recordTypes} for:item="recordType">
                            <button
                                key={recordType.value}
                                type="button"
                                class="record-type-card"
                                data-id={recordType.value}
                                onclick={handleRecordTypeSelect}
                            >
                                <span class="slds-text-title_bold">{recordType.label}</span>
                                <template if:true={recordType.defaultRecordTypeMapping}>
                                    <span class="slds-badge slds-m-top_x-small">Default</span>
                                </template>
                            </button>
                        </template>
                    </div>
                </section>
            </template>

            <template if:true={selectedRecordTypeId}>
                <section class={visitDetailSectionClass}>
                    <h2 class="slds-text-heading_small slds-m-bottom_small">Visit Details</h2>
                    <lightning-record-edit-form object-api-name="Visit" record-type-id={selectedRecordTypeId}>
                        <lightning-messages></lightning-messages>
                        <div class="form-grid">
                            <lightning-input-field
                                data-account-field
                                field-name="AccountId"
                                value={accountId}
                                disabled
                                onchange={handleAccountFieldChange}
                            ></lightning-input-field>
                            <template for:each={visitFields} for:item="field">
                                <lightning-input-field
                                    key={field.apiName}
                                    data-visit-field
                                    data-field={field.apiName}
                                    field-name={field.apiName}
                                    required={field.required}
                                    value={field.value}
                                    onchange={handleVisitFieldChange}
                                ></lightning-input-field>
                            </template>
                        </div>
                    </lightning-record-edit-form>
                </section>
            </template>

            <template if:true={isVisitorStep}>
                <section>
                    <div class="section-header">
                        <h2 class="slds-text-heading_small">Visitors</h2>
                        <lightning-button
                            label="Add"
                            icon-name="utility:add"
                            onclick={openUserModal}
                        ></lightning-button>
                    </div>

                    <div class="slds-m-bottom_medium">
                        <h3 class="slds-text-title_bold slds-m-bottom_x-small">Account Team</h3>
                        <div class="table-wrap">
                            <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                                <thead>
                                    <tr>
                                        <th scope="col">Select</th>
                                        <th scope="col">Name</th>
                                        <th scope="col">Title</th>
                                        <th scope="col">Email</th>
                                        <th scope="col">Source</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={visitorCandidates} for:item="visitor">
                                        <tr key={visitor.userId}>
                                            <td>
                                                <lightning-input
                                                    type="checkbox"
                                                    variant="label-hidden"
                                                    data-id={visitor.userId}
                                                    checked={visitor.selected}
                                                    disabled={visitor.locked}
                                                    onchange={handleVisitorCandidateToggle}
                                                ></lightning-input>
                                            </td>
                                            <td>{visitor.name}</td>
                                            <td>{visitor.title}</td>
                                            <td>{visitor.email}</td>
                                            <td>{visitor.source}</td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <h3 class="slds-text-title_bold slds-m-bottom_x-small">Selected Visitors</h3>
                    <div class="table-wrap">
                        <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                            <thead>
                                <tr>
                                    <th scope="col">Name</th>
                                    <th scope="col">Title</th>
                                    <th scope="col">Email</th>
                                    <th scope="col">Source</th>
                                    <th scope="col">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={selectedVisitors} for:item="visitor">
                                    <tr key={visitor.userId}>
                                        <td>{visitor.name}</td>
                                        <td>{visitor.title}</td>
                                        <td>{visitor.email}</td>
                                        <td>{visitor.source}</td>
                                        <td>
                                            <lightning-button-icon
                                                icon-name="utility:delete"
                                                alternative-text="Remove"
                                                title="Remove"
                                                data-id={visitor.userId}
                                                disabled={visitor.locked}
                                                onclick={removeVisitor}
                                            ></lightning-button-icon>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </section>
            </template>

            <template if:true={isVisitedPartyStep}>
                <section>
                    <div class="section-header">
                        <h2 class="slds-text-heading_small">Visited Parties</h2>
                        <lightning-button
                            label="Add"
                            icon-name="utility:add"
                            onclick={openContactModal}
                        ></lightning-button>
                    </div>

                    <div class="table-wrap">
                        <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                            <thead>
                                <tr>
                                    <th scope="col">Name</th>
                                    <th scope="col">Title</th>
                                    <th scope="col">Email</th>
                                    <th scope="col">Phone</th>
                                    <th scope="col">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template if:false={selectedContacts.length}>
                                    <tr>
                                        <td colspan="5">No visited parties selected.</td>
                                    </tr>
                                </template>
                                <template for:each={selectedContacts} for:item="contact">
                                    <tr
                                        key={contact.contactId}
                                        data-contact-id={contact.contactId}
                                        data-account-id={contact.accountId}
                                    >
                                        <td>{contact.name}</td>
                                        <td>{contact.title}</td>
                                        <td>{contact.email}</td>
                                        <td>{contact.phone}</td>
                                        <td>
                                            <lightning-button-icon
                                                icon-name="utility:delete"
                                                alternative-text="Remove"
                                                title="Remove"
                                                data-id={contact.contactId}
                                                onclick={removeContact}
                                            ></lightning-button-icon>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </section>
            </template>

            <template if:true={isActionPlanStep}>
                <section>
                    <h2 class="slds-text-heading_small slds-m-bottom_small">Action Plan</h2>
                    <div class="form-grid">
                        <lightning-input
                            data-action-plan-field
                            data-field="actionPlanName"
                            type="text"
                            label="Name"
                            value={actionPlanName}
                            required
                            onchange={handleActionPlanFieldChange}
                        ></lightning-input>
                        <lightning-input
                            data-action-plan-field
                            data-field="actionPlanStartDate"
                            type="date"
                            label="Start Date"
                            value={actionPlanStartDate}
                            required
                            onchange={handleActionPlanFieldChange}
                        ></lightning-input>
                        <lightning-input
                            type="text"
                            label="Target Record"
                            value={actionPlanTargetRecordId}
                            disabled
                        ></lightning-input>
                        <lightning-combobox
                            data-action-plan-field
                            data-field="actionPlanStatus"
                            label="Status"
                            value={actionPlanStatus}
                            options={actionPlanStatusOptions}
                            required
                            onchange={handleActionPlanFieldChange}
                        ></lightning-combobox>
                    </div>

                    <section class="action-plan-template-section slds-m-top_large">
                        <h3 class="slds-text-title_bold slds-m-bottom_small">Action Plan Template</h3>
                        <lightning-record-picker
                            data-action-plan-field
                            label="Action Plan Template"
                            object-api-name="ActionPlanTemplateVersion"
                            value={actionPlanTemplateVersionId}
                            filter={actionPlanTemplatePickerFilter}
                            display-info={actionPlanTemplateDisplayInfo}
                            matching-info={actionPlanTemplateMatchingInfo}
                            required
                            onchange={handleActionPlanTemplateLookupChange}
                        ></lightning-record-picker>

                        <template if:true={hasRecentActionPlanTemplates}>
                            <div class="slds-m-top_medium">
                                <h4 class="slds-text-title slds-m-bottom_x-small">Recent Templates</h4>
                                <div class="table-wrap">
                                    <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                                        <thead>
                                            <tr>
                                                <th scope="col">Name</th>
                                                <th scope="col">Type</th>
                                                <th scope="col">Version</th>
                                                <th scope="col">Last Modified</th>
                                                <th scope="col">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={recentActionPlanTemplates} for:item="template">
                                                <tr key={template.templateVersionId}>
                                                    <td>{template.name}</td>
                                                    <td>{template.actionPlanType}</td>
                                                    <td>{template.versionNumber}</td>
                                                    <td>
                                                        <lightning-formatted-date-time
                                                            value={template.lastModifiedDate}
                                                            year="numeric"
                                                            month="short"
                                                            day="2-digit"
                                                        ></lightning-formatted-date-time>
                                                    </td>
                                                    <td>
                                                        <lightning-button
                                                            label="Select"
                                                            data-id={template.templateVersionId}
                                                            onclick={selectRecentActionPlanTemplate}
                                                        ></lightning-button>
                                                    </td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </template>
                    </section>
                </section>
            </template>
        </div>

        <div slot="footer">
            <template if:true={showPrevious}>
                <lightning-button label="Previous" onclick={handlePrevious}></lightning-button>
            </template>
            <template if:true={isVisitDetailStep}>
                <lightning-button
                    variant="brand"
                    label="Next"
                    class="slds-m-left_x-small"
                    onclick={handleVisitDetailNext}
                ></lightning-button>
            </template>
            <template if:true={isVisitorStep}>
                <lightning-button
                    variant="brand"
                    label="Next"
                    class="slds-m-left_x-small"
                    onclick={handleVisitorNext}
                ></lightning-button>
            </template>
            <template if:true={isVisitedPartyStep}>
                <lightning-button
                    label="Save for later"
                    class="slds-m-left_x-small"
                    onclick={handleSaveDraft}
                ></lightning-button>
                <lightning-button
                    label="Add Action Plan"
                    class="slds-m-left_x-small"
                    onclick={handleAddActionPlan}
                ></lightning-button>
                <lightning-button
                    variant="brand"
                    label="Submit"
                    class="slds-m-left_x-small"
                    onclick={handleSubmit}
                ></lightning-button>
            </template>
            <template if:true={isActionPlanStep}>
                <lightning-button
                    variant="brand"
                    label="Submit"
                    class="slds-m-left_x-small"
                    onclick={handleActionPlanSubmit}
                ></lightning-button>
            </template>
        </div>
    </lightning-quick-action-panel>

    <template if:true={showUserModal}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close" title="Close" onclick={closeUserModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="Close" size="small"></lightning-icon>
                    </button>
                    <h2 class="slds-text-heading_medium">Add Visitor</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <div class="lookup-row">
                        <lightning-input
                            type="search"
                            label="Search Users"
                            value={userSearchTerm}
                            onchange={handleUserSearchTermChange}
                            onkeyup={handleUserSearchKeyup}
                        ></lightning-input>
                        <lightning-button label="Search" onclick={runUserSearch}></lightning-button>
                    </div>
                    <div class="table-wrap slds-m-top_medium">
                        <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                            <thead>
                                <tr>
                                    <th scope="col">Name</th>
                                    <th scope="col">Title</th>
                                    <th scope="col">Email</th>
                                    <th scope="col">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={userSearchResults} for:item="user">
                                    <tr key={user.userId}>
                                        <td>{user.name}</td>
                                        <td>{user.title}</td>
                                        <td>{user.email}</td>
                                        <td>
                                            <lightning-button-icon
                                                icon-name="utility:add"
                                                alternative-text="Add"
                                                title="Add"
                                                data-id={user.userId}
                                                onclick={addSearchedUser}
                                            ></lightning-button-icon>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Done" onclick={closeUserModal}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <template if:true={showContactModal}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close" title="Close" onclick={closeContactModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="Close" size="small"></lightning-icon>
                    </button>
                    <h2 class="slds-text-heading_medium">Add Visited Party</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <div class="lookup-row">
                        <lightning-input
                            type="search"
                            label="Search Contacts"
                            value={contactSearchTerm}
                            onchange={handleContactSearchTermChange}
                            onkeyup={handleContactSearchKeyup}
                        ></lightning-input>
                        <lightning-button label="Search" onclick={runContactSearch}></lightning-button>
                    </div>
                    <div class="table-wrap slds-m-top_medium">
                        <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                            <thead>
                                <tr>
                                    <th scope="col">Name</th>
                                    <th scope="col">Title</th>
                                    <th scope="col">Email</th>
                                    <th scope="col">Phone</th>
                                    <th scope="col">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={contactSearchResults} for:item="contact">
                                    <tr key={contact.contactId}>
                                        <td>{contact.name}</td>
                                        <td>{contact.title}</td>
                                        <td>{contact.email}</td>
                                        <td>{contact.phone}</td>
                                        <td>
                                            <lightning-button-icon
                                                icon-name="utility:add"
                                                alternative-text="Add"
                                                title="Add"
                                                data-id={contact.contactId}
                                                onclick={addSearchedContact}
                                            ></lightning-button-icon>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Done" onclick={closeContactModal}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
